name: Run tests

on: workflow_call

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Build
        run: |
          docker build -t image-resizer .
      - name: Run tests
        run: |
          docker compose run -e APP_ENV=test --rm app bundle exec rspec
