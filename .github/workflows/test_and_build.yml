name: Build and publish to public ECR

on:
  pull_request:
    branches:
      - main
      - "[0-9]*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v3
      - name: Build
        run: |
          docker build -t image-resizer .
      - name: Lint
        run: |
          docker compose run --rm app bundle exec rubocop
      - name: Test
        run: |
          docker compose run -e APP_ENV=test --rm app bundle exec rspec

  build:
    name: Publish image
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
    needs: test
    steps:
      - uses: actions/checkout@v5
      - name: Build and push to ECR
        uses: citizensadvice/build-and-private-ecr-push-action@v3
        with:
          repository_name: image-resizer
          auth_token: ${{ secrets.GITHUB_TOKEN }}
          multiarch_build: enabled
          prod_image: true
